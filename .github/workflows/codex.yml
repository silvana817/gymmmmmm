name: Codex Auto Commit

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Change request"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create branch
        run: git checkout -b codex-update

      - name: Generate change with AI
        run: |
          curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model":"gpt-4.1",
              "messages":[{"role":"user","content":"${{ github.event.inputs.prompt }}"}]
            }' > change.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git add .
          git commit -m "codex automatic change"
          git push origin codex-update

      - name: Create PR
        run: |
          gh pr create \
            --title "🤖 Codex update" \
            --body "Automatic change" \
            --base main \
            --head codex-update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
