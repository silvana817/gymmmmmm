name: Codex Auto Commit

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Change request"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup git auth
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Create branch
        run: |
          git checkout -b codex-update

      - name: Generate change with AI
        run: |
          curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\":\"gpt-4.1\",
              \"messages\":[{\"role\":\"user\",\"content\":\"${{ github.event.inputs.prompt }}\"}]
            }" > codex-output.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit changes
        run: |
          git add .
          git commit -m "codex automatic change" || echo "nothing to commit"
          git push origin codex-update

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "🤖 Codex update" \
            --body "Automatic change generated from prompt: ${{ github.event.inputs.prompt }}" \
            --base main \
            --head codex-update || echo "PR already exists"
