name: Auto PR Bot

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create branch
        run: |
          git checkout -b bot-update

      - name: Make change
        run: |
          echo "update $(date)" >> bot-log.txt

      - name: Commit
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git add .
          git commit -m "bot automatic update"

      - name: Push branch
        run: |
          git push origin bot-update

      - name: Create PR
        run: |
          gh pr create \
            --title "🤖 Bot update" \
            --body "Automatic update generated by workflow" \
            --base main \
            --head bot-update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
