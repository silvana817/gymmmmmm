name: Auto PR Bot

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create branch
        run: |
          git checkout -b bot/update-$(date +%s)

      - name: Make change
        run: |
          echo "update $(date)" >> bot-log.txt

      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git add .
          git commit -m "bot automatic update"

      - name: Push branch
        run: |
          git push origin HEAD

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "🤖 Bot update"
          body: "Automatic update generated by workflow"
          branch: bot/update
