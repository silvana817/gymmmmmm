name: Codex Auto Fix

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Change request for Codex"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-edit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create branch
        run: |
          git checkout -b codex-update

      - name: Run Codex
        run: |
          echo "${{ github.event.inputs.prompt }}" > prompt.txt
          echo "Codex would edit files here"

      - name: Commit
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git add .
          git commit -m "codex automatic update"
          git push origin codex-update

      - name: Create PR
        run: |
          gh pr create \
            --title "🤖 Codex update" \
            --body "Automatic change from Codex prompt" \
            --base main \
            --head codex-update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
