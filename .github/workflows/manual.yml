name: Codex Commit Test

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  commit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create test file
        run: |
          echo "update from github action $(date)" >> test.txt

      - name: Commit and push
        run: |
          git config user.name "codex-bot"
          git config user.email "codex@users.noreply.github.com"
          git add .
          git commit -m "auto update from workflow" || echo "no changes"
          git push
